name: macOS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: build-and-test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macos-13 is Intel (x86-64); macos-14 is Apple Silicon (arm64).
        # Rux emits x86-64 Mach-O executables, so on arm64 the produced
        # test binaries run through Rosetta 2 (installed below).
        os: [macos-13, macos-14]

    steps:
      - uses: actions/checkout@v4

      # Rux's C++26 sources need a recent Clang; Apple's bundled clang is too old.
      - name: Install toolchain
        run: brew install llvm cmake ninja

      - name: Install Rosetta 2 (Apple Silicon only)
        if: matrix.os == 'macos-14'
        run: softwareupdate --install-rosetta --agree-to-license

      - name: Configure
        run: |
          CLANGXX="$(brew --prefix llvm)/bin/clang++"
          cmake -S . -B build -G Ninja \
            -DCMAKE_CXX_COMPILER="$CLANGXX" \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Run I/O thunk tests
        # The test script cd's into each package, so rux must be an absolute path.
        run: Tests/run_io_test.sh "$GITHUB_WORKSPACE/build/rux"
