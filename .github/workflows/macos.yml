name: macOS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    # macos-14 is Apple Silicon (arm64). Rux now emits native arm64 Mach-O
    # executables, so the produced test binaries run directly on the host —
    # no Rosetta 2 required.
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v5

      # Rux's C++26 sources need a recent Clang; Apple's bundled clang is too old.
      - name: Install toolchain
        run: brew install llvm cmake ninja

      - name: Configure
        run: |
          CLANGXX="$(brew --prefix llvm)/bin/clang++"
          cmake -S . -B build -G Ninja \
            -DCMAKE_CXX_COMPILER="$CLANGXX" \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Run I/O thunk tests
        # The test script cd's into each package, so rux must be an absolute path.
        run: Tests/run_io_test.sh "$GITHUB_WORKSPACE/build/rux"

      - name: Run integer ** test
        run: Tests/run_pow_test.sh "$GITHUB_WORKSPACE/build/rux"
