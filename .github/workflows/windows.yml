name: Windows

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build-and-test:
    # windows-latest is x86-64, so Rux's PE32+ backend emits executables that
    # run natively here. The I/O thunks resolve against the real GetStdHandle /
    # WriteFile / ReadFile imports.
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      # CMakeLists requires CMake >= 3.31; pull a known-recent CMake + Ninja
      # rather than relying on whatever ships on the runner image.
      - name: Install CMake and Ninja
        uses: lukka/get-cmake@latest

      # Load the MSVC developer environment so CMake can use cl/link directly
      # without needing to discover a full Visual Studio installation.
      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      # Build with Ninja against MSVC. This avoids the Visual Studio generator
      # discovery path that can fail on some Windows runner images.
      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_CXX_COMPILER=cl -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Run I/O thunk tests
        # Run under bash (Git Bash ships on the runner). The script cd's into
        # each package, so rux must be an absolute path.
        shell: bash
        run: Tests/run_io_test.sh "$GITHUB_WORKSPACE/build/rux.exe"

      - name: Run integer ** test
        shell: bash
        run: Tests/run_pow_test.sh "$GITHUB_WORKSPACE/build/rux.exe"
