name: Linux

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build-and-test:
    # ubuntu-latest is x86-64, so Rux's ELF64 backend emits executables that
    # run natively here — no emulation needed (unlike the macOS arm64 runner).
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      # Rux's C++26 sources need a recent Clang; the distro's default is too old.
      - name: Install Clang
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 20
          sudo apt-get install -y libc++-20-dev libc++abi-20-dev

      # CMakeLists requires CMake >= 3.31, newer than the apt package; this also
      # provides Ninja.
      - name: Install CMake and Ninja
        uses: lukka/get-cmake@latest

      # Build against libc++ (as the macOS Homebrew LLVM build does) so the
      # C++26 library bits the sources lean on (std::print, std::format) resolve
      # against a known-complete standard library rather than the system one.
      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_CXX_COMPILER=clang++-20 \
            -DCMAKE_CXX_FLAGS="-stdlib=libc++" \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Run I/O thunk tests
        # The test script cd's into each package, so rux must be an absolute path.
        run: Tests/run_io_test.sh "$GITHUB_WORKSPACE/build/rux"

      - name: Run integer ** test
        run: Tests/run_pow_test.sh "$GITHUB_WORKSPACE/build/rux"
